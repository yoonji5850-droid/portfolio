<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marketing Portfolio</title>
<meta name="description" content="마케팅 콘텐츠 포트폴리오" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <!-- ================= Header ================= -->
  <header class="header" id="header">
    <div class="header-inner">
      <a href="#hero" class="logo" id="logoText">PORTFOLIO</a>

      <nav class="nav" id="nav">
        <a href="#about" class="nav-link">ABOUT</a>
        <a href="#skills" class="nav-link">SKILLS</a>
        <a href="#portfolio" class="nav-link">PROJECT</a>
        <a href="#contact" class="nav-link btn-contact-nav">CONTACT</a>
      </nav>

      <button class="menu-toggle" id="menuToggle" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ================= Hero ================= -->
  <section class="hero" id="hero">
    <div class="hero-bg"></div>
    <div class="hero-content reveal">
      <p class="hero-eyebrow" id="heroEyebrow">MARKETING CONTENT PORTFOLIO</p>
      <h1 class="hero-title" id="heroTitle"></h1>
      <div class="hero-actions">
        <a href="#portfolio" class="btn btn-outline">Project</a>
        <a href="#contact" class="btn btn-primary">Contact</a>
      </div>
    </div>
    <a href="#about" class="scroll-down" aria-label="아래로 스크롤">
      <span class="scroll-down-mouse"><span class="scroll-down-dot"></span></span>
    </a>
  </section>

  <!-- ================= About ================= -->
  <section class="section about" id="about">
    <div class="container">
      <p class="section-eyebrow reveal">ABOUT</p>

      <div class="about-grid">
        <div class="about-photo reveal">
          <div class="about-photo-box" id="aboutPhotoBox">
            <img
              class="about-photo-img"
              id="aboutPhoto"
              src="./images/profile.jpg"
              alt="이윤지 프로필 사진"
              onload="this.parentElement.classList.add('photo-loaded')"
              onerror="this.style.display='none'"
            />
          </div>
        </div>
        <div class="about-text reveal">
          <div class="resume-heading">
            <span class="resume-name" id="resumeName"></span>
            <ul class="resume-meta" id="resumeMeta"></ul>
          </div>

          <div class="resume-block">
            <h3 class="resume-block-title">🎓 학력</h3>
            <ul class="resume-list" id="eduList"></ul>
          </div>

          <div class="resume-block">
            <h3 class="resume-block-title">🗣️ 자격증</h3>
            <ul class="resume-list" id="certList"></ul>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ================= Skills ================= -->
  <section class="section skills" id="skills">
    <div class="container">
      <p class="section-eyebrow reveal">SKILLS</p>
      <h2 class="section-title reveal">핵심 역량</h2>
      <div class="skills-grid" id="skillsGrid"></div>
    </div>
  </section>

  <!-- ================= Portfolio ================= -->
  <section class="section portfolio" id="portfolio">
    <div class="container">
      <p class="section-eyebrow reveal">Project</p>
      <h2 class="section-title reveal">포트폴리오</h2>

      <div class="portfolio-grid" id="portfolioGrid"></div>
    </div>
  </section>

  <!-- ================= Contact ================= -->
  <section class="section contact" id="contact">
    <div class="contact-bg"></div>
    <div class="container">
      <h2 class="section-title light reveal" id="contactTitle"></h2>
      <p class="contact-desc reveal" id="contactDesc"></p>

      <div class="contact-wrap reveal">
        <form class="contact-form" id="contactForm">
          <input type="hidden" name="_subject" value="포트폴리오 문의가 도착했습니다" />
          <input type="hidden" name="_template" value="table" />
          <input type="hidden" name="_captcha" value="false" />
          <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off" />

          <div class="form-row">
            <input type="text" name="name" placeholder="이름" required />
            <input type="email" name="email" placeholder="이메일" required />
          </div>
          <input type="text" name="subject" placeholder="제목" required />
          <textarea name="message" placeholder="문의 내용을 입력해 주세요" rows="5" required></textarea>
          <button type="submit" class="btn btn-primary btn-full">문의하기</button>
          <p class="form-note" id="formNote"></p>
        </form>
      </div>
    </div>
  </section>

  <!-- ================= Footer ================= -->
  <footer class="footer">
    <div class="container footer-inner">
      <p id="footerText"></p>
      <a href="#hero" class="footer-top">TOP ↑</a>
    </div>
  </footer>

  <!-- Floating CTA -->
  <a href="#contact" class="fab-contact" id="fabContact" aria-label="문의하기">문의하기</a>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Portfolio detail modal -->
  <div class="pmodal" id="pmodal" aria-hidden="true">
    <div class="pmodal-overlay" id="pmodalOverlay"></div>
    <div class="pmodal-panel" role="dialog" aria-modal="true">
      <button class="pmodal-close" id="pmodalClose" aria-label="닫기">✕</button>
      <div class="pmodal-media">
        <div class="pmodal-thumb">
          <img id="pmodalImg" src="" alt="" />
          <video id="pmodalVideo" controls playsinline style="display:none;"></video>
          <div class="pmodal-thumb-fallback" id="pmodalImgFallback" style="display:none;"></div>
          <button class="pmodal-nav pmodal-nav-prev" id="pmodalPrev" aria-label="이전 콘텐츠" style="display:none;">‹</button>
          <button class="pmodal-nav pmodal-nav-next" id="pmodalNext" aria-label="다음 콘텐츠" style="display:none;">›</button>
          <div class="pmodal-counter" id="pmodalCounter" style="display:none;"></div>
        </div>
        <div class="pmodal-thumbs" id="pmodalThumbs" style="display:none;"></div>
      </div>
      <div class="pmodal-body">
        <div class="pmodal-tags" id="pmodalTags"></div>
        <h3 class="pmodal-title" id="pmodalTitle"></h3>
        <p class="pmodal-desc" id="pmodalDesc"></p>
        <a class="pmodal-link" id="pmodalLink" href="#" target="_blank" rel="noopener" style="display:none;"></a>
        <div class="pmodal-tools" id="pmodalTools"></div>
      </div>
    </div>
  </div>

<script src="./js/script.js"></script>
</body>
</html>
